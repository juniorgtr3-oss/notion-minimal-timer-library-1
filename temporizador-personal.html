<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temporizador con Sesiones Izquierda</title>
    <style>
        :root {
            --bg-color: transparent;
            --timer-color: #3e4e5e; 
            --accent-color: #3e4e5e;
            --button-bg: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            overflow: hidden;
            position: relative;
        }

        /* Contador de Sesiones Superior Izquierdo */
        .session-container {
            position: absolute;
            top: 15px;
            left: 15px; /* Cambiado de right a left */
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .dots-group {
            display: flex;
            gap: 6px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 1.5px solid var(--accent-color);
            background: transparent;
            transition: background 0.3s ease;
        }

        .dot.filled {
            background: var(--accent-color);
        }

        .reset-sessions-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            color: #ccc;
            display: flex;
            align-items: center;
            font-size: 1rem;
            transition: color 0.2s, transform 0.2s;
        }

        .reset-sessions-btn:hover {
            color: var(--accent-color);
            transform: rotate(-90deg);
        }

        /* Modos */
        .modes {
            display: flex;
            gap: 15px;
            margin-bottom: 5px;
        }

        .mode-btn {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            border: none;
            background: none;
            color: #a0a0a0;
            padding: 5px;
            transition: 0.3s;
        }

        .mode-btn.active {
            color: var(--accent-color);
            font-weight: bold;
            border-bottom: 2px solid var(--accent-color);
        }

        .timer-display {
            font-size: 5rem;
            font-weight: 700;
            margin: 5px 0;
            letter-spacing: -4px;
            color: var(--timer-color);
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn {
            background: var(--button-bg);
            border: 1px solid #e0e0e0;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.75rem;
            color: var(--timer-color);
            transition: all 0.2s ease;
        }

        .btn:hover {
            border-color: var(--accent-color);
            background: #f4f6f7;
        }

        .settings-toggle {
            background: none;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            padding: 5px;
            color: #ccc;
            transition: transform 0.3s, color 0.3s;
            display: flex;
            align-items: center;
        }

        .settings-toggle:hover {
            color: var(--accent-color);
            transform: rotate(45deg);
        }

        #settings-panel {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border: 1px solid #eee;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            z-index: 100;
            width: 200px;
        }

        .field { margin-bottom: 10px; }
        label { display: block; font-size: 0.7rem; color: #666; margin-bottom: 3px; }
        input { width: 100%; padding: 5px; border-radius: 4px; border: 1px solid #ddd; font-size: 0.8rem; box-sizing: border-box; }
        
        .save-btn {
            width: 100%;
            background: var(--timer-color);
            color: white;
            border: none;
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="session-container">
        <div class="dots-group" id="dotsGroup">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
        <button class="reset-sessions-btn" onclick="resetSessions()" title="Reiniciar sesiones">↺</button>
    </div>

    <div class="modes">
        <button class="mode-btn active" id="focusModeBtn" onclick="switchMode('focus')">Focus</button>
        <button class="mode-btn" id="breakModeBtn" onclick="switchMode('break')">Break</button>
        <button class="mode-btn" id="descansoModeBtn" onclick="switchMode('descanso')">Descanso</button>
    </div>

    <div class="timer-display" id="display">25:00</div>
    
    <div class="controls">
        <button class="btn" onclick="startTimer()">Empezar</button>
        <button class="btn" onclick="pauseTimer()">Pausa</button>
        <button class="btn" onclick="resetTimer()">Reiniciar</button>
        <button class="settings-toggle" onclick="toggleSettings()">⚙️</button>
    </div>

    <div id="settings-panel">
        <div class="field"><label>Minutos Focus:</label><input type="number" id="focusIn" value="25"></div>
        <div class="field"><label>Minutos Break:</label><input type="number" id="breakIn" value="5"></div>
        <div class="field"><label>Minutos Descanso:</label><input type="number" id="descansoIn" value="15"></div>
        <div class="field"><label>Color Números:</label><input type="color" id="numCol" value="#3e4e5e"></div>
        <div class="field"><label>Color Interfaz:</label><input type="color" id="accCol" value="#3e4e5e"></div>
        <button class="save-btn" onclick="saveSettings()">Guardar Cambios</button>
    </div>

    <audio id="alarmSound" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3" loop></audio>

    <script>
        let times = {
            focus: localStorage.getItem('focus_v5') || 25,
            break: localStorage.getItem('break_v5') || 5,
            descanso: localStorage.getItem('descanso_v5') || 15
        };
        let colors = {
            num: localStorage.getItem('numCol_v5') || '#3e4e5e',
            acc: localStorage.getItem('accCol_v5') || '#3e4e5e'
        };
        
        let timeLeft = times.focus * 60;
        let timerId = null;
        let endTime = null;
        let currentMode = 'focus';
        let completedSessions = parseInt(localStorage.getItem('sessionCount')) || 0;
        const alarm = document.getElementById('alarmSound');

        function init() {
            document.documentElement.style.setProperty('--timer-color', colors.num);
            document.documentElement.style.setProperty('--accent-color', colors.acc);
            document.getElementById('focusIn').value = times.focus;
            document.getElementById('breakIn').value = times.break;
            document.getElementById('descansoIn').value = times.descanso;
            document.getElementById('numCol').value = colors.num;
            document.getElementById('accCol').value = colors.acc;
            updateDisplay();
            updateSessionsUI();
        }

        function updateDisplay() {
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            document.getElementById('display').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function updateSessionsUI() {
            const dots = document.querySelectorAll('.dot');
            dots.forEach((dot, index) => {
                if (index < completedSessions) {
                    dot.classList.add('filled');
                } else {
                    dot.classList.remove('filled');
                }
            });
        }

        function resetSessions() {
            completedSessions = 0;
            localStorage.setItem('sessionCount', 0);
            updateSessionsUI();
        }

        function stopAlarm() {
            alarm.pause();
            alarm.currentTime = 0;
        }

        function startTimer() {
            if (timerId) return;
            stopAlarm();
            
            endTime = Date.now() + (timeLeft * 1000);

            timerId = setInterval(() => {
                const now = Date.now();
                const difference = Math.round((endTime - now) / 1000);

                if (difference <= 0) {
                    timeLeft = 0;
                    updateDisplay();
                    clearInterval(timerId);
                    timerId = null;
                    
                    if (currentMode === 'focus') {
                        completedSessions = Math.min(completedSessions + 1, 4);
                        localStorage.setItem('sessionCount', completedSessions);
                        updateSessionsUI();
                    }
                    
                    alarm.play();
                } else {
                    timeLeft = difference;
                    updateDisplay();
                }
            }, 200);
        }

        function pauseTimer() { 
            clearInterval(timerId); 
            timerId = null; 
            stopAlarm(); 
        }

        function resetTimer() {
            pauseTimer();
            stopAlarm();
            timeLeft = times[currentMode] * 60;
            updateDisplay();
        }

        function switchMode(mode) {
            currentMode = mode;
            ['focus','break','descanso'].forEach(m => {
                document.getElementById(`${m}ModeBtn`).classList.toggle('active', m === mode);
            });
            resetTimer();
        }

        function toggleSettings() {
            const p = document.getElementById('settings-panel');
            p.style.display = p.style.display === 'block' ? 'none' : 'block';
        }

        function saveSettings() {
            times.focus = document.getElementById('focusIn').value;
            times.break = document.getElementById('breakIn').value;
            times.descanso = document.getElementById('descansoIn').value;
            colors.num = document.getElementById('numCol').value;
            colors.acc = document.getElementById('accCol').value;

            localStorage.setItem('focus_v5', times.focus);
            localStorage.setItem('break_v5', times.break);
            localStorage.setItem('descanso_v5', times.descanso);
            localStorage.setItem('numCol_v5', colors.num);
            localStorage.setItem('accCol_v5', colors.acc);

            init();
            toggleSettings();
            resetTimer();
        }

        init();
    </script>
</body>
</html>
