<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg-color: transparent;
            /* Nuevos colores base extraídos de la imagen y ajustados para legibilidad */
            --widget-bg-color: #374853; /* El color de la imagen */
            --timer-color: #e0e0e0; /* Un gris claro cremoso para el texto del temporizador */
            --accent-color: #b0c4de; /* Un azul acero claro para acentos activos */
            --button-bg: #465a6a; /* Un gris oscuro ligeramente más claro que el fondo del widget */
            --button-border: #617a8c;
            --button-text-color: #c0c0c0; /* Un gris medio claro */
            --panel-bg-color: #465a6a; /* Fondo oscuro para el panel de configuración */
            --input-bg-color: #374853; /* Fondo de inputs igual al widget bg */
            --input-text-color: #e0e0e0;
            --input-border-color: #617a8c;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            /* El widget es transparente para Notion, pero tiene un fondo interno */
            background-color: var(--bg-color);
            overflow: hidden;
        }

        /* Contenedor del Widget */
        #widget-container {
            background-color: var(--widget-bg-color);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Modos */
        .modes {
            display: flex;
            gap: 15px;
            margin-bottom: 5px;
        }

        .mode-btn {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            border: none;
            background: none;
            color: #a0a0a0; /* Gris inactivo */
            padding: 5px;
            transition: 0.3s;
        }

        .mode-btn.active {
            color: var(--accent-color);
            font-weight: bold;
            border-bottom: 2px solid var(--accent-color);
        }

        /* Temporizador */
        .timer-display {
            font-size: 5rem;
            font-weight: 700;
            margin: 5px 0;
            letter-spacing: -4px;
            color: var(--timer-color);
        }

        /* Botones */
        .controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn {
            background: var(--button-bg);
            border: 1px solid var(--button-border);
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.75rem;
            color: var(--button-text-color);
            transition: all 0.2s ease;
        }

        .btn:hover {
            border-color: var(--accent-color);
            background: #5a707f; /* Ligeramente más claro para hover */
        }

        .settings-toggle {
            background: none;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            padding: 5px;
            color: #ccc;
            transition: transform 0.3s, color 0.3s;
            display: flex;
            align-items: center;
        }

        .settings-toggle:hover {
            color: var(--accent-color);
            transform: rotate(45deg);
        }

        /* Panel de Configuración */
        #settings-panel {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--panel-bg-color);
            border: 1px solid var(--button-border);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 100;
            width: 200px;
        }

        .field { margin-bottom: 10px; }
        label { display: block; font-size: 0.7rem; color: #a0b0b8; margin-bottom: 3px; } /* Gris azulado claro */
        input { 
            width: 100%; 
            padding: 5px; 
            border-radius: 4px; 
            border: 1px solid var(--input-border-color); 
            background: var(--input-bg-color);
            color: var(--input-text-color);
            font-size: 0.8rem; 
            box-sizing: border-box; 
        }
        
        .save-btn {
            width: 100%;
            background: var(--timer-color);
            color: var(--widget-bg-color);
            border: none;
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div id="widget-container">
        <div class="modes">
            <button class="mode-btn active" id="focusModeBtn" onclick="switchMode('focus')">Focus</button>
            <button class="mode-btn" id="breakModeBtn" onclick="switchMode('break')">Break</button>
            <button class="mode-btn" id="descansoModeBtn" onclick="switchMode('descanso')">Descanso</button>
        </div>

        <div class="timer-display" id="display">25:00</div>
        
        <div class="controls">
            <button class="btn" onclick="startTimer()">Empezar</button>
            <button class="btn" onclick="pauseTimer()">Pausa</button>
            <button class="btn" onclick="resetTimer()">Reiniciar</button>
            <button class="settings-toggle" onclick="toggleSettings()">⚙️</button>
        </div>
    </div>

    <div id="settings-panel">
        <div class="field"><label>Minutos Focus:</label><input type="number" id="focusIn" value="25"></div>
        <div class="field"><label>Minutos Break:</label><input type="number" id="breakIn" value="5"></div>
        <div class="field"><label>Minutos Descanso:</label><input type="number" id="descansoIn" value="15"></div>
        <div class="field"><label>Color Números (Gris Claro):</label><input type="color" id="numCol" value="#e0e0e0"></div>
        <div class="field"><label>Color Acento (Azul Acero):</label><input type="color" id="accCol" value="#b0c4de"></div>
        <button class="save-btn" onclick="saveSettings()">Guardar Cambios</button>
    </div>

    <audio id="alarmSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" loop></audio>

    <script>
        let times = {
            focus: localStorage.getItem('focus_2') || 25,
            break: localStorage.getItem('break_2') || 5,
            descanso: localStorage.getItem('descanso_2') || 15
        };
        let colors = {
            num: localStorage.getItem('numCol_2') || '#e0e0e0', // Gris claro por defecto
            acc: localStorage.getItem('accCol_2') || '#b0c4de' // Azul acero claro por defecto
        };
        
        let timeLeft = times.focus * 60;
        let timerId = null;
        let currentMode = 'focus';
        const alarm = document.getElementById('alarmSound');

        function init() {
            document.documentElement.style.setProperty('--timer-color', colors.num);
            document.documentElement.style.setProperty('--accent-color', colors.acc);
            document.getElementById('focusIn').value = times.focus;
            document.getElementById('breakIn').value = times.break;
            document.getElementById('descansoIn').value = times.descanso;
            document.getElementById('numCol').value = colors.num;
            document.getElementById('accCol').value = colors.acc;
            updateDisplay();
        }

        function updateDisplay() {
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            document.getElementById('display').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function stopAlarm() {
            alarm.pause();
            alarm.currentTime = 0;
        }

        function startTimer() {
            if (timerId) return;
            stopAlarm();
            timerId = setInterval(() => {
                timeLeft--;
                updateDisplay();
                if (timeLeft <= 0) {
                    clearInterval(timerId);
                    timerId = null;
                    alarm.play();
                }
            }, 1000);
        }

        function pauseTimer() { 
            clearInterval(timerId); 
            timerId = null; 
            stopAlarm(); 
        }

        function resetTimer() {
            pauseTimer();
            stopAlarm();
            timeLeft = times[currentMode] * 60;
            updateDisplay();
        }

        function switchMode(mode) {
            currentMode = mode;
            ['focus','break','descanso'].forEach(m => {
                document.getElementById(`${m}ModeBtn`).classList.toggle('active', m === mode);
            });
            resetTimer();
        }

        function toggleSettings() {
            const p = document.getElementById('settings-panel');
            p.style.display = p.style.display === 'block' ? 'none' : 'block';
        }

        function saveSettings() {
            times.focus = document.getElementById('focusIn').value;
            times.break = document.getElementById('breakIn').value;
            times.descanso = document.getElementById('descansoIn').value;
            colors.num = document.getElementById('numCol').value;
            colors.acc = document.getElementById('accCol').value;

            // Usar claves diferentes para localStorage para evitar interferencias
            localStorage.setItem('focus_2', times.focus);
            localStorage.setItem('break_2', times.break);
            localStorage.setItem('descanso_2', times.descanso);
            localStorage.setItem('numCol_2', colors.num);
            localStorage.setItem('accCol_2', colors.acc);

            init();
            toggleSettings();
            resetTimer();
        }

        init();
    </script>
</body>
</html>
