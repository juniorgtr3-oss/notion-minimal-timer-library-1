<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg-color: transparent;
            --timer-color: #37352f; /* Color de los números */
            --accent-color: #eb5757; /* Color de botones y modos */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            background-color: var(--bg-color);
        }

        /* Modos */
        .modes {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
        }

        .mode-btn {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border: none;
            background: none;
            color: #a0a0a0;
            padding: 5px 0;
            transition: 0.3s;
        }

        .mode-btn.active {
            color: var(--accent-color);
            font-weight: bold;
            border-bottom: 2px solid var(--accent-color);
        }

        /* Timer - Centrado y Limpio */
        .timer-display {
            font-size: 5rem;
            font-weight: 700;
            margin: 10px 0;
            letter-spacing: -3px;
            color: var(--timer-color);
            line-height: 1;
        }

        /* Controles Inferiores */
        .controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn {
            background: none;
            border: 1px solid #e0e0e0;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            color: #37352f;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn:hover {
            border-color: var(--accent-color);
            background: #f9f9f9;
        }

        .btn-settings {
            padding: 8px;
            border-radius: 50%;
            font-size: 1.1rem;
        }

        /* Panel de Configuración */
        #settings-panel {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border: 1px solid #eee;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
            z-index: 100;
            width: 220px;
        }

        .settings-field { margin-bottom: 12px; }
        .settings-field label {
            display: block;
            font-size: 0.75rem;
            margin-bottom: 4px;
            color: #666;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 6px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 0.9rem;
        }

        .save-btn {
            width: 100%;
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="modes">
        <button class="mode-btn active" id="focoBtn" onclick="switchMode('foco')">Foco</button>
        <button class="mode-btn" id="relajoBtn" onclick="switchMode('relajo')">Relajo</button>
        <button class="mode-btn" id="descansoBtn" onclick="switchMode('descanso')">Descanso</button>
    </div>

    <div class="timer-display" id="display">25:00</div>
    
    <div class="controls">
        <button class="btn" onclick="startTimer()">Empezar</button>
        <button class="btn" onclick="pauseTimer()">Pausa</button>
        <button class="btn" onclick="resetTimer()">Reiniciar</button>
        <button class="btn btn-settings" onclick="toggleSettings()">⚙️</button>
    </div>

    <div id="settings-panel">
        <div class="settings-field"><label>Minutos Foco:</label><input type="number" id="focoIn" value="25"></div>
        <div class="settings-field"><label>Minutos Relajo:</label><input type="number" id="relajoIn" value="5"></div>
        <div class="settings-field"><label>Minutos Descanso:</label><input type="number" id="descansoIn" value="15"></div>
        <div class="settings-field"><label>Color Números:</label><input type="color" id="timerColorIn" value="#37352f"></div>
        <div class="settings-field"><label>Color Interfaz:</label><input type="color" id="accentColorIn" value="#eb5757"></div>
        <button class="save-btn" onclick="saveSettings()">Guardar</button>
    </div>

    <audio id="alarmSound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

    <script>
        let config = {
            foco: localStorage.getItem('foco') || 25,
            relajo: localStorage.getItem('relajo') || 5,
            descanso: localStorage.getItem('descanso') || 15,
            timerColor: localStorage.getItem('timerColor') || '#37352f',
            accentColor: localStorage.getItem('accentColor') || '#eb5757'
        };
        
        let timeLeft = config.foco * 60;
        let timerId = null;
        let currentMode = 'foco';

        function init() {
            document.documentElement.style.setProperty('--timer-color', config.timerColor);
            document.documentElement.style.setProperty('--accent-color', config.accentColor);
            document.getElementById('focoIn').value = config.foco;
            document.getElementById('relajoIn').value = config.relajo;
            document.getElementById('descansoIn').value = config.descanso;
            document.getElementById('timerColorIn').value = config.timerColor;
            document.getElementById('accentColorIn').value = config.accentColor;
            updateDisplay();
        }

        function updateDisplay() {
            const min = Math.floor(timeLeft / 60);
            const sec = timeLeft % 60;
            document.getElementById('display').textContent = `${min}:${sec < 10 ? '0' : ''}${sec}`;
        }

        function startTimer() {
            if (timerId) return;
            timerId = setInterval(() => {
                timeLeft--;
                updateDisplay();
                if (timeLeft <= 0) {
                    clearInterval(timerId);
                    timerId = null;
                    document.getElementById('alarmSound').play();
                }
            }, 1000);
        }

        function pauseTimer() { clearInterval(timerId); timerId = null; }

        function resetTimer() {
            pauseTimer();
            timeLeft = config[currentMode] * 60;
            updateDisplay();
        }

        function switchMode(mode) {
            currentMode = mode;
            ['foco', 'relajo', 'descanso'].forEach(m => {
                document.getElementById(m + 'Btn').classList.toggle('active', m === mode);
            });
            resetTimer();
        }

        function toggleSettings() {
            const p = document.getElementById('settings-panel');
            p.style.display = p.style.display === 'block' ? 'none' : 'block';
        }

        function saveSettings() {
            config.foco = document.getElementById('focoIn').value;
            config.relajo = document.getElementById('relajoIn').value;
            config.descanso = document.getElementById('descansoIn').value;
            config.timerColor = document.getElementById('timerColorIn').value;
            config.accentColor = document.getElementById('accentColorIn').value;

            Object.keys(config).forEach(key => localStorage.setItem(key, config[key]));
            
            init();
            toggleSettings();
            resetTimer();
        }

        init();
    </script>
</body>
</html>
