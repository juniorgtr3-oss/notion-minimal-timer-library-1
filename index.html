<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg-color: transparent;
            --timer-color: #37352f;
            --accent-color: #eb5757;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            overflow: hidden; /* Evita barras de scroll innecesarias */
        }

        .modes {
            display: flex;
            gap: 12px;
            margin-bottom: 5px;
        }

        .mode-btn {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border: none;
            background: none;
            color: #a0a0a0;
            padding: 5px;
            transition: 0.3s;
        }

        .mode-btn.active {
            color: var(--accent-color);
            font-weight: bold;
            border-bottom: 2px solid var(--accent-color);
        }

        .timer-display {
            font-size: 4.5rem;
            font-weight: 700;
            margin: 5px 0;
            letter-spacing: -3px;
            color: var(--timer-color);
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn {
            background: white;
            border: 1px solid #e0e0e0;
            padding: 6px 12px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.75rem;
            color: var(--timer-color);
            transition: 0.2s;
        }

        .btn:hover { border-color: var(--accent-color); }

        .settings-toggle {
            background: none;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            color: #a0a0a0;
        }

        /* PANEL DE CONFIGURACIÓN MEJORADO PARA NOTION */
        #settings-panel {
            display: none;
            position: absolute;
            top: 10px;
            background: white;
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            z-index: 100;
            width: 180px;
        }

        .field { margin-bottom: 8px; }
        label { display: block; font-size: 0.65rem; color: #666; }
        input, select { width: 100%; padding: 4px; font-size: 0.75rem; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        
        .save-btn {
            width: 100%;
            background: var(--timer-color);
            color: white;
            border: none;
            padding: 6px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 5px;
            font-size: 0.75rem;
        }
    </style>
</head>
<body>

    <div class="modes">
        <button class="mode-btn active" id="focusBtn" onclick="switchMode('focus')">Focus</button>
        <button class="mode-btn" id="relajoBtn" onclick="switchMode('relajo')">Relajo</button>
        <button class="mode-btn" id="descansoBtn" onclick="switchMode('descanso')">Descanso</button>
    </div>

    <div class="timer-display" id="display">25:00</div>
    
    <div class="controls">
        <button class="btn" onclick="startTimer()">Empezar</button>
        <button class="btn" onclick="pauseTimer()">Pausa</button>
        <button class="btn" onclick="resetTimer()">Reiniciar</button>
        <button class="settings-toggle" onclick="toggleSettings()">⚙️</button>
    </div>

    <div id="settings-panel">
        <div class="field"><label>Tiempos (F/R/D):</label>
            <div style="display:flex; gap:2px;">
                <input type="number" id="fIn" value="25" title="Focus">
                <input type="number" id="rIn" value="5" title="Relajo">
                <input type="number" id="dIn" value="15" title="Descanso">
            </div>
        </div>
        <div class="field"><label>Color Números:</label><input type="color" id="nCol" value="#37352f"></div>
        <div class="field"><label>Color Interfaz:</label><input type="color" id="aCol" value="#eb5757"></div>
        <div class="field">
            <label>Sonido:</label>
            <select id="sSel">
                <option value="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">Sutil</option>
                <option value="https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg">Digital</option>
                <option value="https://actions.google.com/sounds/v1/office/light_switch_on.ogg">Click Zen</option>
            </select>
        </div>
        <button class="save-btn" onclick="saveSettings()">Guardar</button>
    </div>

    <audio id="alarmSound"></audio>

    <script>
        let times = { focus: localStorage.getItem('f') || 25, relajo: localStorage.getItem('r') || 5, descanso: localStorage.getItem('d') || 15 };
        let colors = { num: localStorage.getItem('nc') || '#37352f', acc: localStorage.getItem('ac') || '#eb5757' };
        let sound = localStorage.getItem('snd') || "https://actions.google.com/sounds/v1/alarms/beep_short.ogg";
        
        let timeLeft = times.focus * 60;
        let timerId = null;
        let currentMode = 'focus';

        function init() {
            document.documentElement.style.setProperty('--timer-color', colors.num);
            document.documentElement.style.setProperty('--accent-color', colors.acc);
            document.getElementById('fIn').value = times.focus;
            document.getElementById('rIn').value = times.relajo;
            document.getElementById('dIn').value = times.descanso;
            document.getElementById('nCol').value = colors.num;
            document.getElementById('aCol').value = colors.acc;
            document.getElementById('sSel').value = sound;
            updateDisplay();
        }

        function updateDisplay() {
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            document.getElementById('display').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function startTimer() {
            if (timerId) return;
            timerId = setInterval(() => {
                timeLeft--; updateDisplay();
                if (timeLeft <= 0) {
                    clearInterval(timerId); timerId = null;
                    const a = document.getElementById('alarmSound');
                    a.src = sound; a.play();
                }
            }, 1000);
        }

        function pauseTimer() { clearInterval(timerId); timerId = null; }
        function resetTimer() { pauseTimer(); timeLeft = times[currentMode] * 60; updateDisplay(); }

        function switchMode(mode) {
            currentMode = mode;
            ['focus','relajo','descanso'].forEach(m => document.getElementById(m+'Btn').classList.toggle('active', m === mode));
            resetTimer();
        }

        function toggleSettings() {
            const p = document.getElementById('settings-panel');
            p.style.display = p.style.display === 'block' ? 'none' : 'block';
        }

        function saveSettings() {
            times.focus = document.getElementById('fIn').value;
            times.relajo = document.getElementById('rIn').value;
            times.descanso = document.getElementById('dIn').value;
            colors.num = document.getElementById('nCol').value;
            colors.acc = document.getElementById('aCol').value;
            sound = document.getElementById('sSel').value;

            localStorage.setItem('f', times.focus); localStorage.setItem('r', times.relajo); localStorage.setItem('d', times.descanso);
            localStorage.setItem('nc', colors.num); localStorage.setItem('ac', colors.acc); localStorage.setItem('snd', sound);

            init(); toggleSettings(); resetTimer();
        }
        init();
    </script>
</body>
</html>
